name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
          - os: ubuntu-latest
          - os: macos-13
          - os: macos-latest
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.4.0
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          package-manager-cache: false

      - name: Export APP_VERSION from tag
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: echo "APP_VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV

      - name: Sync version files
        if: startsWith(github.ref, 'refs/tags/v')
        run: node scripts/sync-version.mjs

      - name: Install Linux deps (glib/gtk)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            pkg-config

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Apply frontend env overrides
        shell: bash
        env:
          CI_VITE_SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL || secrets.VITE_SUPABASE_URL }}
          CI_VITE_SUPABASE_ANON_KEY: ${{ vars.VITE_SUPABASE_ANON_KEY || secrets.VITE_SUPABASE_ANON_KEY }}
          CI_VITE_DEFAULT_MANIFEST_URL: ${{ vars.VITE_DEFAULT_MANIFEST_URL || secrets.VITE_DEFAULT_MANIFEST_URL }}
        run: |
          if [[ -n "$CI_VITE_SUPABASE_URL" ]]; then
            echo "VITE_SUPABASE_URL=$CI_VITE_SUPABASE_URL" >> .env.production
          fi
          if [[ -n "$CI_VITE_SUPABASE_ANON_KEY" ]]; then
            echo "VITE_SUPABASE_ANON_KEY=$CI_VITE_SUPABASE_ANON_KEY" >> .env.production
          fi
          if [[ -n "$CI_VITE_DEFAULT_MANIFEST_URL" ]]; then
            echo "VITE_DEFAULT_MANIFEST_URL=$CI_VITE_DEFAULT_MANIFEST_URL" >> .env.production
          fi

      - name: Build and release with Tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
        with:
          projectPath: .
          tagName: ${{ github.ref_name }}
          releaseName: ${{ github.ref_name }}
          releaseBody: |
            Automated release for ${{ github.ref_name }}.
            Includes installers for Windows, macOS and Linux when available.
          includeUpdaterJson: true

      - name: Create stable Windows installer name
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $src = Get-ChildItem -Path "src-tauri/target/release/bundle/nsis" -Filter "*_x64-setup.exe" |
            Sort-Object LastWriteTime -Descending |
            Select-Object -First 1
          if (-not $src) { throw "NSIS installer not found in bundle output." }
          Copy-Item $src.FullName "src-tauri/target/release/bundle/nsis/catalogo_ips_x64-setup.exe" -Force

      - name: Upload stable Windows installer
        if: matrix.os == 'windows-latest'
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          files: src-tauri/target/release/bundle/nsis/catalogo_ips_x64-setup.exe

      - name: Commit DB to main
        if: startsWith(github.ref, 'refs/tags/') && matrix.os == 'ubuntu-latest'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          git config user.email "actions@github.com"
          git config user.name "github-actions"
          # clean working tree before switching branches
          git reset --hard
          git clean -fd
          git fetch origin main
          git checkout -B main origin/main
          git checkout "$GITHUB_SHA" -- data/catalog.db
          git add data/catalog.db
          if git diff --cached --quiet; then
            echo "No db changes to commit."
            exit 0
          fi

          git commit -m "chore: update db from $GITHUB_REF"

          for attempt in 1 2 3; do
            git fetch origin main
            if ! git merge-base --is-ancestor origin/main HEAD; then
              git rebase origin/main
            fi

            if git push origin HEAD:main; then
              exit 0
            fi

            echo "Push attempt ${attempt} failed; retrying..."
            sleep $((attempt * 2))
          done

          echo "Failed to push db update after retries."
          exit 1
