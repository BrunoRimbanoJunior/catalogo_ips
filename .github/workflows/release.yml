name: release

on:
  push:
    tags:
      - 'v*'
      - '[0-9]*'

permissions:
  contents: write

jobs:
  build-release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            args: ""
            rustTarget: ""
          - os: ubuntu-latest
            args: ""
            rustTarget: ""
          - os: macos-13
            args: "--target x86_64-apple-darwin"
            rustTarget: "x86_64-apple-darwin"
          - os: macos-latest
            args: "--target aarch64-apple-darwin"
            rustTarget: "aarch64-apple-darwin"
    runs-on: ${{ matrix.os }}
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.4.0
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          package-manager-cache: false

      - name: Export APP_VERSION from tag
        shell: bash
        run: |
          APP_VERSION="${GITHUB_REF_NAME#v}"
          APP_VERSION="${APP_VERSION#.}"
          if [[ ! "$APP_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+([-.+][0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid app version from tag '${GITHUB_REF_NAME}': '${APP_VERSION}'" >&2
            exit 1
          fi
          echo "APP_VERSION=${APP_VERSION}" >> $GITHUB_ENV

      - name: Sync version files
        run: node scripts/sync-version.mjs

      - name: Install Linux deps (glib/gtk)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            pkg-config

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install macOS Rust target
        if: matrix.rustTarget != ''
        run: rustup target add ${{ matrix.rustTarget }}

      - name: Apply frontend env overrides
        shell: bash
        env:
          CI_VITE_SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL || secrets.VITE_SUPABASE_URL }}
          CI_VITE_SUPABASE_ANON_KEY: ${{ vars.VITE_SUPABASE_ANON_KEY || secrets.VITE_SUPABASE_ANON_KEY }}
          CI_VITE_DEFAULT_MANIFEST_URL: ${{ vars.VITE_DEFAULT_MANIFEST_URL || secrets.VITE_DEFAULT_MANIFEST_URL }}
        run: |
          if [[ -n "$CI_VITE_SUPABASE_URL" ]]; then
            echo "VITE_SUPABASE_URL=$CI_VITE_SUPABASE_URL" >> .env.production
          fi
          if [[ -n "$CI_VITE_SUPABASE_ANON_KEY" ]]; then
            echo "VITE_SUPABASE_ANON_KEY=$CI_VITE_SUPABASE_ANON_KEY" >> .env.production
          fi
          if [[ -n "$CI_VITE_DEFAULT_MANIFEST_URL" ]]; then
            echo "VITE_DEFAULT_MANIFEST_URL=$CI_VITE_DEFAULT_MANIFEST_URL" >> .env.production
          fi

      - name: Build and release with Tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
        with:
          projectPath: .
          tagName: ${{ github.ref_name }}
          releaseName: ${{ github.ref_name }}
          releaseBody: |
            Automated release for ${{ github.ref_name }}.
            Includes installers for Windows, macOS and Linux when available.
          includeUpdaterJson: true
          args: ${{ matrix.args }}

      - name: Create stable Windows installer name
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $src = Get-ChildItem -Path "src-tauri/target/release/bundle/nsis" -Filter "*_x64-setup.exe" |
            Sort-Object LastWriteTime -Descending |
            Select-Object -First 1
          if (-not $src) { throw "NSIS installer not found in bundle output." }
          Copy-Item $src.FullName "src-tauri/target/release/bundle/nsis/catalogo_ips_x64-setup.exe" -Force

      - name: Upload stable Windows installer
        if: matrix.os == 'windows-latest'
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          files: src-tauri/target/release/bundle/nsis/catalogo_ips_x64-setup.exe

      - name: Commit DB to main
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.email "actions@github.com"
          git config user.name "github-actions"
          # clean working tree before switching branches
          git reset --hard
          git clean -fd
          git fetch origin main
          git checkout main
          git checkout $GITHUB_SHA -- data/catalog.db
          git add data/catalog.db
          git commit -m "chore: update db from $GITHUB_REF" || echo "No db changes"
          git push origin main
