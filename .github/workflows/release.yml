name: release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Tag existente que será compilada e publicada, por exemplo v1.5.19'
        required: true
        type: string

permissions:
  contents: write

jobs:
  prepare-release:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GH_REPO: ${{ github.repository }}
      TARGET_TAG: ${{ inputs.release_tag || github.ref_name }}
    steps:
      - name: Validate tag
        run: |
          if [[ "$TARGET_TAG" != v* ]]; then
            echo "Invalid release tag: $TARGET_TAG" >&2
            exit 1
          fi
          git ls-remote --exit-code --tags "https://github.com/${GITHUB_REPOSITORY}.git" "refs/tags/$TARGET_TAG"

      - name: Create draft release if missing
        run: |
          if gh release view "$TARGET_TAG" >/dev/null 2>&1; then
            echo "Release $TARGET_TAG already exists."
          else
            gh release create "$TARGET_TAG" \
              --verify-tag \
              --draft \
              --title "$TARGET_TAG" \
              --notes "Automated release for $TARGET_TAG."
          fi

  build-release:
    needs: prepare-release
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ inputs.release_tag || github.ref }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.4.0
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          package-manager-cache: false

      - name: Export release tag and app version
        shell: bash
        env:
          TARGET_TAG: ${{ inputs.release_tag || github.ref_name }}
        run: |
          if [[ "$TARGET_TAG" != v* ]]; then
            echo "Invalid release tag: $TARGET_TAG" >&2
            exit 1
          fi
          echo "RELEASE_TAG=$TARGET_TAG" >> "$GITHUB_ENV"
          echo "APP_VERSION=${TARGET_TAG#v}" >> "$GITHUB_ENV"

      - name: Sync version files
        run: node scripts/sync-version.mjs

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Apply frontend env overrides
        shell: bash
        env:
          CI_VITE_SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL || secrets.VITE_SUPABASE_URL }}
          CI_VITE_SUPABASE_ANON_KEY: ${{ vars.VITE_SUPABASE_ANON_KEY || secrets.VITE_SUPABASE_ANON_KEY }}
          CI_VITE_DEFAULT_MANIFEST_URL: ${{ vars.VITE_DEFAULT_MANIFEST_URL || secrets.VITE_DEFAULT_MANIFEST_URL }}
        run: |
          if [[ -n "$CI_VITE_SUPABASE_URL" ]]; then
            echo "VITE_SUPABASE_URL=$CI_VITE_SUPABASE_URL" >> .env.production
          fi
          if [[ -n "$CI_VITE_SUPABASE_ANON_KEY" ]]; then
            echo "VITE_SUPABASE_ANON_KEY=$CI_VITE_SUPABASE_ANON_KEY" >> .env.production
          fi
          # Um override antigo configurado no repositório não pode fazer novas
          # versões voltarem a consumir o manifest congelado da última release.
          DEFAULT_MANIFEST_URL="https://raw.githubusercontent.com/${GITHUB_REPOSITORY}/main/manifest.json"
          if [[ -n "$CI_VITE_DEFAULT_MANIFEST_URL" && "$CI_VITE_DEFAULT_MANIFEST_URL" != *"/releases/latest/download/manifest.json"* ]]; then
            DEFAULT_MANIFEST_URL="$CI_VITE_DEFAULT_MANIFEST_URL"
          fi
          echo "VITE_DEFAULT_MANIFEST_URL=$DEFAULT_MANIFEST_URL" >> .env.production

      - name: Validate bundled database and manifest
        shell: bash
        run: node scripts/validate-manifest.mjs --manifest manifest.json --db data/catalog.db

      - name: Build and release with Tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
        with:
          projectPath: .
          tagName: ${{ env.RELEASE_TAG }}
          releaseName: ${{ env.RELEASE_TAG }}
          releaseBody: |
            Automated release for ${{ env.RELEASE_TAG }}.
            Includes installers for Windows.
          includeUpdaterJson: true

      - name: Create stable Windows installer name
        shell: pwsh
        run: |
          $src = Get-ChildItem -Path "src-tauri/target/release/bundle/nsis" -Filter "*_x64-setup.exe" |
            Sort-Object LastWriteTime -Descending |
            Select-Object -First 1
          if (-not $src) { throw "NSIS installer not found in bundle output." }
          Copy-Item $src.FullName "src-tauri/target/release/bundle/nsis/catalogo_ips_x64-setup.exe" -Force

      - name: Upload stable Windows installer
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          files: src-tauri/target/release/bundle/nsis/catalogo_ips_x64-setup.exe

  publish-release:
    needs: build-release
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GH_REPO: ${{ github.repository }}
      TARGET_TAG: ${{ inputs.release_tag || github.ref_name }}
    steps:
      - name: Publish completed release
        run: gh release edit "$TARGET_TAG" --draft=false --latest
