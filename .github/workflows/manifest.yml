name: manifest

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag to publish manifest, for example v1.5.15'
        required: false
        type: string
  schedule:
    - cron: '0 3 * * *' # diário 03:00 UTC
  push:
    branches: [ main ]
    paths:
      - 'data/**'
      - 'scripts/gen-manifest-r2.mjs'
      - 'scripts/validate-manifest.mjs'
    tags:
      - 'v*'
  workflow_run:
    workflows: ["auto-tag"]
    types: [completed]

permissions:
  contents: write

jobs:
  gen-manifest:
    concurrency:
      group: main-writes
      cancel-in-progress: false
    # Se veio de workflow_run, garante que foi sucesso e branch main
    if: ${{ github.event_name != 'workflow_run' || (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v5
        with:
          ref: main
          fetch-depth: 0

      - name: Sync main before generation
        run: |
          git fetch origin main
          git checkout -B main origin/main

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.4.0
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          package-manager-cache: false

      - name: Install deps (pnpm)
        run: pnpm install --frozen-lockfile

      - name: Compute version
        id: ver
        env:
          RELEASE_TAG_INPUT: ${{ github.event.inputs.release_tag || '' }}
        run: |
          DB_PATH="data/catalog.db"
          SOURCE_SHA=$(git rev-parse HEAD)
          DATE_VER=$(date +%d%m%y%H)
          if [[ -f "$DB_PATH" ]]; then
            DB_VER=$(sqlite3 "$DB_PATH" "SELECT value FROM meta WHERE key='db_version' LIMIT 1;" || echo "")
            DB_SHA=$(sha256sum "$DB_PATH" | cut -d' ' -f1)
          fi
          DB_VER=${DB_VER:-$DATE_VER}
          echo "version=${DB_VER}" >> $GITHUB_OUTPUT
          echo "db_version=${DB_VER}" >> $GITHUB_OUTPUT
          echo "db_sha=${DB_SHA}" >> $GITHUB_OUTPUT
          echo "source_sha=${SOURCE_SHA}" >> $GITHUB_OUTPUT
          RELEASE_TAG="$RELEASE_TAG_INPUT"
          if [[ -z "$RELEASE_TAG" && "${GITHUB_REF}" == refs/tags/v* ]]; then
            RELEASE_TAG="${GITHUB_REF_NAME}"
          fi
          if [[ "$RELEASE_TAG" == v* ]]; then
            APP_VERSION="${RELEASE_TAG#v}"
            echo "release_tag=${RELEASE_TAG}" >> $GITHUB_OUTPUT
            echo "app_version=${APP_VERSION}" >> $GITHUB_OUTPUT
            echo "download_url=https://github.com/${GITHUB_REPOSITORY}/releases/download/${RELEASE_TAG}/catalogo_ips_x64-setup.exe" >> $GITHUB_OUTPUT
          else
            echo "release_tag=" >> $GITHUB_OUTPUT
            echo "app_version=" >> $GITHUB_OUTPUT
            echo "download_url=" >> $GITHUB_OUTPUT
          fi

      - name: Generate manifest from R2
        env:
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_PUBLIC_BASE_URL: ${{ secrets.R2_PUBLIC_BASE_URL }}
        run: |
          # O banco fica preso ao commit que foi validado. Nunca apontar um hash
          # para a branch móvel main, pois ela pode mudar antes do próximo cliente baixar.
          DB_URL="https://raw.githubusercontent.com/${{ github.repository }}/${{ steps.ver.outputs.source_sha }}/data/catalog.db"
          node scripts/gen-manifest-r2.mjs \
            --version ${{ steps.ver.outputs.version }} \
            --db-version ${{ steps.ver.outputs.db_version }} \
            --db-sha "${{ steps.ver.outputs.db_sha }}" \
            --db-url "$DB_URL" \
            --app-version "${{ steps.ver.outputs.app_version }}" \
            --app-download-url "${{ steps.ver.outputs.download_url }}" \
            --out manifest.json

      - name: Validate manifest against local and published DB
        run: node scripts/validate-manifest.mjs --manifest manifest.json --db data/catalog.db --check-remote

      - name: Commit and push manifest
        id: publish
        # Todos os eventos trabalham sobre main (checkout explícito acima), inclusive
        # schedule e workflow_run. Não condicionar por github.ref, que varia por evento.
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Preserve o artefato validado fora do worktree. Em caso de concorrência,
          # reconstruímos o commit sobre a main atual em vez de fazer rebase de commits
          # antigos de manifest, que sempre conflitam no mesmo arquivo JSON.
          cp manifest.json /tmp/generated-manifest.json
          SOURCE_DB_BLOB=$(git rev-parse "${{ steps.ver.outputs.source_sha }}:data/catalog.db")

          for attempt in 1 2 3; do
            git fetch origin main

            LATEST_DB_BLOB=$(git rev-parse "origin/main:data/catalog.db")
            if [[ "$LATEST_DB_BLOB" != "$SOURCE_DB_BLOB" ]]; then
              echo "A main já contém um banco mais novo; não publicando manifest obsoleto."
              echo "stale=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi

            git reset --hard origin/main
            cp /tmp/generated-manifest.json manifest.json
            git add manifest.json

            if git diff --cached --quiet; then
              echo "No manifest changes to commit."
              exit 0
            fi

            git commit -m "ci: update manifest.json"

            if git push origin HEAD:main; then
              exit 0
            fi

            echo "Push attempt ${attempt} failed; rebuilding on latest main..."
            sleep $((attempt * 2))
          done

          echo "Failed to push manifest after retries."
          exit 1


      - name: Upload manifest artifact
        if: steps.publish.outputs.stale != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: manifest.json
          path: manifest.json

      # Mantido apenas para inspeção da release. O aplicativo usa o manifest
      # estável da main; db.url dentro dele é sempre imutável por commit.
      - name: Release manifest (tag)
        if: steps.ver.outputs.release_tag != '' && steps.publish.outputs.stale != 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.release_tag }}
          files: manifest.json
