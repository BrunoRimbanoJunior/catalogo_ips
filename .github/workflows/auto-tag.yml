name: auto-tag

on:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  bump-tag:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Skip if commit from bot (manifest update)
        id: skip
        run: |
          author=$(git log -1 --pretty=%an)
          msg=$(git log -1 --pretty=%s)
          echo "author=$author" >> $GITHUB_OUTPUT
          echo "msg=$msg" >> $GITHUB_OUTPUT
          if [ "$author" = "github-actions[bot]" ] && echo "$msg" | grep -qi "manifest" ; then
            echo "skip=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          echo "skip=false" >> $GITHUB_OUTPUT

      - name: Set tag from package.json
        if: steps.skip.outputs.skip == 'false'
        id: ver
        shell: bash
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if [ -z "$VERSION" ]; then
            echo "package.json version not found" >&2
            exit 1
          fi
          echo "next=v$VERSION" >> $GITHUB_OUTPUT

      - name: Configure git user
        if: steps.skip.outputs.skip == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Create tag if missing
        if: steps.skip.outputs.skip == 'false'
        env:
          NEXT: ${{ steps.ver.outputs.next }}
        run: |
          if git rev-parse "$NEXT" >/dev/null 2>&1; then
            TAG_SHA=$(git rev-parse "$NEXT")
            HEAD_SHA=$(git rev-parse HEAD)
            if [ "$TAG_SHA" = "$HEAD_SHA" ]; then
              echo "Tag $NEXT already points to HEAD."
            else
              echo "Tag $NEXT already exists on $TAG_SHA; skipping to avoid moving it."
            fi
            exit 0
          fi

          git tag -a "$NEXT" -m "auto: $NEXT"
          git push origin "$NEXT"
