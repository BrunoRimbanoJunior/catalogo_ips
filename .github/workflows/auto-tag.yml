name: auto-tag

on:
  push:
    branches: [ main ]

permissions:
  contents: write
  actions: write

jobs:
  bump-tag:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Skip if commit from bot (manifest update)
        id: skip
        run: |
          author=$(git log -1 --pretty=%an)
          msg=$(git log -1 --pretty=%s)
          echo "author=$author" >> $GITHUB_OUTPUT
          echo "msg=$msg" >> $GITHUB_OUTPUT
          if [ "$author" = "github-actions[bot]" ] && echo "$msg" | grep -qi "manifest" ; then
            echo "skip=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          echo "skip=false" >> $GITHUB_OUTPUT

      - name: Set tag from package.json
        if: steps.skip.outputs.skip == 'false'
        id: ver
        shell: bash
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if [ -z "$VERSION" ]; then
            echo "package.json version not found" >&2
            exit 1
          fi
          echo "next=v$VERSION" >> $GITHUB_OUTPUT

      - name: Configure git user
        if: steps.skip.outputs.skip == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Create tag if missing
        id: tag
        if: steps.skip.outputs.skip == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NEXT: ${{ steps.ver.outputs.next }}
        run: |
          if git rev-parse "$NEXT" >/dev/null 2>&1; then
            TAG_SHA=$(git rev-parse "$NEXT^{}")
            HEAD_SHA=$(git rev-parse HEAD)
            RELEASE_STATE=$(gh release view "$NEXT" --json isDraft,assets --jq 'if .isDraft then "draft" elif any(.assets[]; .name == "catalogo_ips_x64-setup.exe") then "complete" else "incomplete" end' 2>/dev/null || echo "missing")
            if [[ "$RELEASE_STATE" == "complete" ]]; then
              echo "Release $NEXT is already complete on $TAG_SHA; HEAD is $HEAD_SHA. Skipping."
              echo "dispatch=false" >> "$GITHUB_OUTPUT"
            else
              echo "Tag $NEXT has an incomplete Release ($RELEASE_STATE); dispatching recovery build."
              echo "dispatch=true" >> "$GITHUB_OUTPUT"
            fi
            exit 0
          fi

          git tag -a "$NEXT" -m "auto: $NEXT"
          git push origin "$NEXT"
          echo "dispatch=true" >> "$GITHUB_OUTPUT"

      # Pushes feitos com GITHUB_TOKEN não disparam outro workflow por push.
      # Disparamos explicitamente o release.yml para a tag criada/confirmada.
      - name: Dispatch release workflow
        if: steps.skip.outputs.skip == 'false' && steps.tag.outputs.dispatch == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NEXT: ${{ steps.ver.outputs.next }}
        run: gh workflow run release.yml --ref main -f release_tag="$NEXT"
